name: Build HTML from Markdown

on:
  push:
    branches: [master]
    paths:
      - 'chapters/**'
      - 'resources/md2html.py'
  workflow_dispatch:

# 允许这个工作流直接 push 回 master（重新生成 site/）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown pygments

      - name: Run md2html.py
        run: |
          python resources/md2html.py

      - name: Show generated files
        run: |
          ls -la site/
          echo "---"
          echo "Generated HTML count:"
          ls site/*.html | wc -l

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain site/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git status --porcelain site/
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in site/"
          fi

      - name: Commit & push regenerated HTML
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git commit -m "chore: auto-regenerate site/ from chapters/"
          git push
